<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScentVault — Master Fragrance Portfolio</title>
<style>
    :root {
        --bg-main: #0b0f19;
        --bg-surface: #131c2e;
        --bg-input: #1e2d4a;
        --text-main: #f1f5f9;
        --text-muted: #94a3b8;
        --border: #1e293b;
        --accent-blue: #38bdf8;
        --accent-green: #34d399;
        --accent-amber: #fbbf24;
        --accent-purple: #a855f7;
        --danger: #f87171;
        --hover: #1e2942;
        --shadow: rgba(0, 0, 0, 0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        background-color: var(--bg-main); color: var(--text-main);
        padding: 1.75rem; line-height: 1.5;
    }
    .container { max-width: 1700px; margin: 0 auto; }

    /* Header */
    header {
        display: flex; flex-wrap: wrap; justify-content: space-between; align-items: flex-end;
        gap: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 1.25rem;
    }
    h1 { font-size: 2rem; letter-spacing: -0.03em; }
    h1 span {
        background: linear-gradient(to right, #38bdf8, #34d399);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .subtitle { color: var(--text-muted); font-size: 0.95rem; margin-top: 0.25rem; }
    .header-tools { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    .btn {
        background-color: var(--bg-surface); border: 1px solid var(--border); color: var(--text-main);
        padding: 0.5rem 0.9rem; border-radius: 0.5rem; cursor: pointer; font-weight: 600;
        font-size: 0.82rem; display: inline-flex; align-items: center; gap: 0.4rem; transition: all 0.15s;
    }
    .btn:hover { border-color: var(--accent-blue); background-color: var(--hover); }
    .btn-primary { background-color: var(--accent-blue); color: #0b0f19; border-color: var(--accent-blue); }
    .btn-primary:hover { background-color: #7dd3fc; }
    .btn-accent { background-color: var(--accent-green); color: #052e1f; border-color: var(--accent-green); }
    .btn.active { background-color: var(--accent-amber); color: #3b2c05; border-color: var(--accent-amber); }

    /* Summary cards */
    .summary-dashboard {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 0.75rem; margin-bottom: 1.25rem;
    }
    .stat-card {
        background-color: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px;
        padding: 0.9rem; text-align: center; box-shadow: 0 4px 12px var(--shadow);
    }
    .stat-num { font-size: 1.6rem; font-weight: 800; color: var(--accent-blue); }
    .stat-card.green .stat-num { color: var(--accent-green); }
    .stat-card.amber .stat-num { color: var(--accent-amber); }
    .stat-card.purple .stat-num { color: var(--accent-purple); }
    .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-top: 0.2rem; }

    /* Filters */
    .filter-dashboard {
        background-color: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px;
        padding: 1rem 1.25rem; margin-bottom: 1rem; display: flex; flex-direction: column; gap: 0.85rem;
        box-shadow: 0 4px 18px var(--shadow);
    }
    .filter-group { display: flex; align-items: center; gap: 0.85rem; flex-wrap: wrap; }
    .filter-label {
        font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
        color: var(--accent-blue); min-width: 150px;
    }
    .filter-btn-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .filter-btn {
        background-color: #0f172a; color: var(--text-main); border: 1px solid var(--border);
        padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.78rem; font-weight: 500; transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--accent-blue); background-color: var(--hover); }
    .filter-btn.active { background-color: var(--accent-blue); color: #0b0f19; border-color: var(--accent-blue); font-weight: 600; }

    .search-row { display: flex; gap: 0.75rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .search-input {
        flex: 1; min-width: 240px; background-color: var(--bg-surface); border: 1px solid var(--border);
        border-radius: 0.5rem; padding: 0.7rem 1.1rem; color: var(--text-main); font-size: 0.92rem;
    }
    .search-input:focus { outline: none; border-color: var(--accent-blue); }

    /* Table */
    .table-container {
        background-color: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px;
        overflow-x: auto; box-shadow: 0 10px 25px -5px var(--shadow);
    }
    table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.88rem; }
    th {
        background-color: #0f172a; color: var(--accent-blue); padding: 0.85rem 1rem; font-weight: 600;
        text-transform: uppercase; font-size: 0.72rem; letter-spacing: 0.06em; border-bottom: 1px solid var(--border);
        cursor: pointer; user-select: none; white-space: nowrap;
    }
    th.no-sort { cursor: default; }
    th .arrow { font-size: 0.65rem; opacity: 0.5; margin-left: 0.2rem; }
    td { padding: 0.8rem 1rem; border-bottom: 1px solid var(--border); vertical-align: top; }
    .data-row { cursor: pointer; transition: background-color 0.12s; }
    .data-row:hover td { background-color: var(--hover); }
    tr:nth-child(4n+1) td { background-color: rgba(255,255,255,0.012); }

    .perfume-name { font-weight: 600; color: #ffffff; font-size: 0.92rem; }
    .perfume-name.wish { color: var(--accent-purple); }
    .house-tag { color: var(--text-muted); font-size: 0.78rem; display: inline-block; margin-top: 2px; }
    .flag-warn { color: var(--accent-amber); cursor: help; margin-left: 0.3rem; font-size: 0.8rem; }
    .layer-dot { color: var(--accent-blue); font-size: 0.7rem; margin-left: 0.3rem; }

    .notes-list { font-size: 0.82rem; color: #cbd5e1; line-height: 1.5; }
    .notes-label { color: var(--accent-blue); font-weight: 500; font-size: 0.72rem; text-transform: uppercase; margin-right: 3px; }

    .badge {
        display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.68rem; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.03em; text-align: center; min-width: 84px; white-space: nowrap;
    }
    .badge-beast { background-color: rgba(52,211,153,0.1); color: var(--accent-green); border: 1px solid rgba(52,211,153,0.25); }
    .badge-long  { background-color: rgba(56,189,248,0.1); color: var(--accent-blue); border: 1px solid rgba(56,189,248,0.25); }
    .badge-mod   { background-color: rgba(245,158,11,0.1); color: var(--accent-amber); border: 1px solid rgba(245,158,11,0.25); }
    .badge-weak  { background-color: rgba(239,68,68,0.1); color: var(--danger); border: 1px solid rgba(239,68,68,0.25); }
    .badge-none  { background-color: #0f172a; color: var(--text-muted); border: 1px dashed var(--border); }

    .rating-pill {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 3px 8px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; white-space: nowrap;
    }
    .rating-outstanding { background: rgba(52,211,153,0.12); color: var(--accent-green); border: 1px solid rgba(52,211,153,0.3); }
    .rating-great       { background: rgba(56,189,248,0.12); color: var(--accent-blue);  border: 1px solid rgba(56,189,248,0.3); }
    .rating-decent      { background: rgba(251,191,36,0.12); color: var(--accent-amber); border: 1px solid rgba(251,191,36,0.3); }
    .rating-weak        { background: rgba(248,113,113,0.12); color: var(--danger);       border: 1px solid rgba(248,113,113,0.3); }
    .rating-none        { background: #0f172a; color: var(--text-muted); border: 1px dashed var(--border); }

    .scenario-badge {
        display: inline-block; padding: 3px 8px; border-radius: 20px; background-color: #1e293b;
        color: #cbd5e1; font-size: 0.72rem; font-weight: 500; border: 1px solid #334155; white-space: nowrap;
    }
    .status-badge { display: inline-block; font-size: 0.72rem; font-weight: 700; padding: 3px 7px; border-radius: 4px; border: 1px solid; }
    .st-owned   { color: var(--accent-green); border-color: rgba(52,211,153,0.4); }
    .st-ordered { color: var(--accent-blue); border-color: rgba(56,189,248,0.4); }
    .st-wishlist{ color: var(--accent-purple); border-color: rgba(168,85,247,0.4); }
    .price-tag { display: block; font-size: 0.72rem; color: var(--text-muted); margin-top: 3px; }

    /* Accordion detail */
    .detail-row { display: none; }
    .detail-row td { padding: 0; }
    .detail-container {
        padding: 1.25rem 1.5rem; background-color: #0d1524; border-left: 3px solid var(--accent-blue);
        display: grid; grid-template-columns: 2fr 1fr; gap: 1.25rem; animation: slideDown 0.18s ease-out;
    }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    .review-box {
        background-color: #18253f; padding: 0.8rem; border-radius: 0.4rem; font-style: italic;
        font-size: 0.86rem; border-left: 2px solid var(--accent-green); margin-bottom: 0.75rem;
    }
    .layering-box {
        background-color: rgba(56,189,248,0.04); border-left: 2px solid var(--accent-blue);
        padding: 0.6rem 0.8rem; border-radius: 0 4px 4px 0; font-size: 0.85rem; color: #e2e8f0; margin-bottom: 0.75rem;
    }
    .layering-target { color: var(--accent-blue); font-weight: 600; }
    .fragrantica-link {
        display: inline-flex; align-items: center; gap: 0.35rem; color: var(--accent-green);
        font-weight: 700; text-decoration: none; font-size: 0.85rem;
    }
    .fragrantica-link:hover { text-decoration: underline; }
    .detail-stats-box { background-color: #141f35; padding: 1rem; border-radius: 0.4rem; border: 1px solid var(--border); }
    .stat-item { margin-bottom: 0.6rem; font-size: 0.86rem; }
    .stat-key { font-weight: 700; color: var(--accent-blue); display: block; font-size: 0.72rem; text-transform: uppercase; }
    .detail-actions { margin-top: 0.75rem; display: flex; gap: 0.5rem; }

    .empty-row td { text-align: center; color: var(--text-muted); font-style: italic; padding: 2.5rem; }

    /* edit-mode-only controls */
    .edit-only { display: none; }
    body.edit-enabled .edit-only { display: inline-flex; }
    body.edit-enabled th.col-edit, body.edit-enabled td.col-edit { display: table-cell; }
    th.col-edit, td.col-edit { display: none; }
    .row-btn {
        width: 28px; height: 28px; border-radius: 0.3rem; border: none; color: #0b0f19; font-weight: bold;
        cursor: pointer; display: inline-flex; align-items: center; justify-content: center; margin: 0 1px; font-size: 0.8rem;
    }
    .btn-edit { background-color: var(--accent-blue); }
    .btn-del { background-color: var(--danger); color: #fff; }

    /* Modal */
    .modal-overlay {
        display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100;
        align-items: flex-start; justify-content: center; padding: 3rem 1rem; overflow-y: auto;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
        background-color: var(--bg-surface); border: 1px solid var(--border); border-radius: 0.75rem;
        padding: 1.5rem; width: 100%; max-width: 760px; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }
    .modal h3 { margin-bottom: 1rem; color: var(--accent-blue); }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 0.85rem; margin-bottom: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.3rem; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.03em; }
    .form-control {
        background-color: var(--bg-input); border: 1px solid var(--border); border-radius: 0.35rem;
        padding: 0.55rem; color: var(--text-main); font-size: 0.9rem; font-family: inherit;
    }
    .form-control:focus { outline: none; border-color: var(--accent-blue); }
    textarea.form-control { resize: vertical; min-height: 60px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 0.5rem; }

    /* Pick-for-me banner */
    .pick-banner {
        display: none; background: linear-gradient(135deg, #1e293b, #0f172a); border: 1px solid var(--accent-green);
        border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1rem; align-items: center; gap: 1rem; justify-content: space-between;
    }
    .pick-banner.visible { display: flex; flex-wrap: wrap; }
    .pick-banner .pick-name { font-size: 1.15rem; font-weight: 700; color: var(--accent-green); }
    .pick-banner .pick-sub { color: var(--text-muted); font-size: 0.85rem; }

    @media (max-width: 800px) { .detail-container { grid-template-columns: 1fr; } body { padding: 1rem; } }
</style>
</head>
<body>
<div class="container">
    <header>
        <div>
            <h1>Scent<span>Vault</span></h1>
            <p class="subtitle">Master Portfolio — Tri-Axis Matrix · Layering Engine · Editable & Persistent</p>
        </div>
        <div class="header-tools">
            <button class="btn btn-accent" onclick="pickForMe()">🎲 Pick for me</button>
            <button class="btn" id="flagFilterBtn" onclick="toggleFlagFilter()">⚠️ Flagged</button>
            <button class="btn edit-only" onclick="openModal()">➕ Add</button>
            <button class="btn" onclick="exportJSON()">⬇️ Export</button>
            <button class="btn" onclick="document.getElementById('importFile').click()">⬆️ Import</button>
            <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importJSON(event)">
            <button class="btn" id="editToggleBtn" onclick="toggleEdit()">✏️ Edit Mode</button>
            <button class="btn" onclick="resetData()" title="Restore the original bundled dataset">↺ Reset</button>
        </div>
    </header>

    <div class="summary-dashboard" id="summaryDashboard"></div>

    <div class="pick-banner" id="pickBanner">
        <div>
            <div class="pick-name" id="pickName"></div>
            <div class="pick-sub" id="pickSub"></div>
        </div>
        <div style="display:flex;gap:0.5rem">
            <button class="btn" onclick="pickForMe()">🎲 Again</button>
            <button class="btn" onclick="document.getElementById('pickBanner').classList.remove('visible')">✕ Close</button>
        </div>
    </div>

    <div class="filter-dashboard">
        <div class="filter-group">
            <div class="filter-label">1. Fragrance Family</div>
            <div class="filter-btn-row" id="family-filters"></div>
        </div>
        <div class="filter-group">
            <div class="filter-label">2. Use Scenario</div>
            <div class="filter-btn-row" id="scenario-filters"></div>
        </div>
        <div class="filter-group">
            <div class="filter-label">3. Inspiration House</div>
            <div class="filter-btn-row" id="house-filters"></div>
        </div>
        <div class="filter-group">
            <div class="filter-label">4. Status</div>
            <div class="filter-btn-row" id="status-filters"></div>
        </div>
    </div>

    <div class="search-row">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search name, house, inspiration, notes, or layering partner…">
    </div>

    <div class="table-container">
        <table id="masterTable">
            <thead>
                <tr>
                    <th class="no-sort" style="width:2%"></th>
                    <th data-sort="name" style="width:16%">Fragrance <span class="arrow"></span></th>
                    <th data-sort="inspiration" style="width:14%">Inspiration / DNA <span class="arrow"></span></th>
                    <th class="no-sort" style="width:30%">Scent Profile & Notes</th>
                    <th data-sort="perf" style="width:9%">Performance <span class="arrow"></span></th>
                    <th data-sort="rating" style="width:7%">Rating <span class="arrow"></span></th>
                    <th data-sort="scenario" style="width:9%">Use Case <span class="arrow"></span></th>
                    <th data-sort="status" style="width:10%">Status / Price <span class="arrow"></span></th>
                    <th class="no-sort col-edit" style="width:8%">Edit</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<!-- Edit/Add Modal -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h3 id="modalTitle">Add Fragrance</h3>
        <input type="hidden" id="f-id">
        <div class="form-grid">
            <div class="form-group"><label>Name</label><input class="form-control" id="f-name" placeholder="Turathi Blue"></div>
            <div class="form-group"><label>House / Brand</label><input class="form-control" id="f-house" placeholder="Afnan"></div>
            <div class="form-group full"><label>Inspiration / DNA</label><input class="form-control" id="f-inspiration" placeholder="Bvlgari Tygar"></div>
            <div class="form-group"><label>Family</label><select class="form-control" id="f-family"></select></div>
            <div class="form-group"><label>Use Scenario</label><select class="form-control" id="f-scenario"></select></div>
            <div class="form-group"><label>Inspiration House Group</label><select class="form-control" id="f-houseCat"></select></div>
            <div class="form-group"><label>Status</label><select class="form-control" id="f-status"></select></div>
            <div class="form-group"><label>Performance</label><select class="form-control" id="f-perf"></select></div>
            <div class="form-group"><label>My Rating (0–10, blank if unrated)</label><input class="form-control" id="f-rating" type="number" min="0" max="10" step="0.5" placeholder="e.g. 8.5"></div>
            <div class="form-group"><label>Price ($, blank if none)</label><input class="form-control" id="f-price" type="number" step="0.01" placeholder="59.00"></div>
            <div class="form-group"><label>Top Notes</label><input class="form-control" id="f-top"></div>
            <div class="form-group"><label>Heart / Mid Notes</label><input class="form-control" id="f-heart"></div>
            <div class="form-group"><label>Base Notes</label><input class="form-control" id="f-base"></div>
            <div class="form-group"><label>Longevity</label><input class="form-control" id="f-longevity" placeholder="8 - 9 Hours"></div>
            <div class="form-group"><label>Projection</label><input class="form-control" id="f-projection" placeholder="Strong / Radiant"></div>
            <div class="form-group full"><label>Layering Recommendation</label><textarea class="form-control" id="f-layering"></textarea></div>
            <div class="form-group full"><label>Review / Assessment</label><textarea class="form-control" id="f-review"></textarea></div>
            <div class="form-group full"><label>Flag note (discrepancy / needs audit — blank if none)</label><input class="form-control" id="f-flag"></div>
        </div>
        <div class="modal-actions">
            <button class="btn" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" onclick="saveEntry()">Save</button>
        </div>
    </div>
</div>

<script>
/* ============================ DATA MODEL ============================
   Unified schema merged from both source files. Where the two files
   overlapped, the richer record (notes + review + longevity) was kept
   and conflicts recorded in `flag`. Fields left empty are gaps to be
   audited/fleshed out later.
   family: fresh|blue|aventus|earthy|winter
   scenario: office|casual|date|formal|clubbing
   houseCat: lv|creed|ysl|dior|chanel|tomford|pacorabanne-jpg|bvlgari-sospiro|pdm|kilian|original-other
   status: owned|ordered|wishlist
   perf: beast|long|mod|weak|"" (unknown)
=================================================================== */
const SEED = [
  // ---------- SUMMER FRESHIES ----------
  {name:"Turathi Blue",house:"Afnan",inspiration:"Bvlgari Tygar (Grapefruit / Deep Ambroxan)",family:"fresh",scenario:"office",houseCat:"bvlgari-sospiro",status:"owned",perf:"long",price:null,top:"Grapefruit, Bergamot, Mandarin",heart:"Woody Notes, Jasmine, Patchouli",base:"Ambroxan, Musk, Ambergris",longevity:"8 - 9 Hours",projection:"Strong / Radiant",review:"Gold-standard Tygar clone. Piercing, realistic grapefruit that stays crisp throughout thanks to a massive dose of high-quality ambroxan.",layering:"Apply directly over {Toro} to frame an ultra-modern citrus above the mineral vetiver drydown.",flag:""},
  {name:"Aariz",house:"Arabiyat Prestige",inspiration:"Bvlgari Tygar / Sospiro Vibrato",family:"fresh",scenario:"formal",houseCat:"bvlgari-sospiro",status:"owned",perf:"beast",price:null,top:"Grapefruit, Lemon Sorbet, Bergamot",heart:"Spicy Accords, Ginger, Powdery Notes",base:"Ambergris, Dry Woods, Cedarwood",longevity:"7 - 8 Hours",projection:"Moderate - Strong",review:"Smooth, slightly sweeter take on the Tygar DNA. Lacks the synthetic sting of cheaper freshies; clean linen and bright rind.",layering:"",flag:""},
  {name:"Majesty",house:"Maison Asrar",inspiration:"Bvlgari Tygar / Sospiro Vibrato",family:"fresh",scenario:"office",houseCat:"bvlgari-sospiro",status:"owned",perf:"beast",price:null,top:"Grapefruit, Bergamot, Pink Pepper",heart:"Ginger, Orris, Jasmine, Rose",base:"Ambergris, Cedarwood, Musk, Vetiver",longevity:"8+ Hours",projection:"Heavy",review:"Powdery, refined floral nuance from Orris/Jasmine, capturing the premium 'Vibrato' profile over a strong, clean base.",layering:"",flag:""},

/* ============================ CONFIG / LABELS ============================ */
const FAMILY = {fresh:"☀️ Summer Freshies", blue:"💧 Blue & Aromatics", aventus:"🍍 Aventus & Iris", earthy:"🪵 Earthy & Leather", winter:"❄️ Winter Heavyweights"};
const SCENARIO = {office:"💼 Office / Corporate", casual:"👕 Casual / Daily", date:"🌙 Date Night", formal:"👔 Formal / Black Tie", clubbing:"🔥 Party / Clubbing"};
const HOUSECAT = {lv:"Louis Vuitton", creed:"Creed / Bond No 9", ysl:"YSL", dior:"Dior", chanel:"Chanel", tomford:"Tom Ford", "pacorabanne-jpg":"Paco Rabanne / JPG", "bvlgari-sospiro":"Bvlgari / Sospiro", pdm:"Parfums de Marly", kilian:"Kilian", "original-other":"Originals & Other"};
const STATUS = {owned:"Owned", ordered:"Ordered", wishlist:"Wishlist"};
const PERF = {beast:{cls:"badge-beast",txt:"Beast Mode"}, long:{cls:"badge-long",txt:"Long Lasting"}, mod:{cls:"badge-mod",txt:"Moderate"}, weak:{cls:"badge-weak",txt:"Weak / Reapply"}, "":{cls:"badge-none",txt:"— (audit)"}};
const PERF_ORDER = {beast:4, long:3, mod:2, weak:1, "":0};

/* ============================ STATE ============================ */
let data = [];
const filters = {family:"all", scenario:"all", houseCat:"all", status:"all"};
let searchTerm = "", flagOnly = false, sortKey = null, sortDir = 1;

const STORE_KEY = "scentvault_v2";

function load() {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) { try { data = JSON.parse(raw); } catch(e) { data = seedCopy(); } }
    else { data = seedCopy(); save(); }
    data.forEach((d,i) => { if (!d.id) d.id = "f" + i + "_" + Math.floor(performance.now()*1000); });
}
function seedCopy() { return SEED.map((d,i) => ({...d, id: "seed" + i})); }
function save() { localStorage.setItem(STORE_KEY, JSON.stringify(data)); }

/* ============================ FILTER BAR BUILD ============================ */
function buildFilterBar(containerId, dict, key) {
    const c = document.getElementById(containerId);
    let html = `<button class="filter-btn active" data-val="all">All</button>`;
    for (const k in dict) html += `<button class="filter-btn" data-val="${k}">${dict[k]}</button>`;
    c.innerHTML = html;
    c.addEventListener("click", e => {
        if (!e.target.classList.contains("filter-btn")) return;
        c.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        e.target.classList.add("active");
        filters[key] = e.target.getAttribute("data-val");
        render();
    });
}

/* ============================ RENDER ============================ */
function matches(item) {
    if (filters.family !== "all" && item.family !== filters.family) return false;
    if (filters.scenario !== "all" && item.scenario !== filters.scenario) return false;
    if (filters.houseCat !== "all" && item.houseCat !== filters.houseCat) return false;
    if (filters.status !== "all" && item.status !== filters.status) return false;
    if (flagOnly && !item.flag) return false;
    if (searchTerm) {
        const hay = [item.name, item.house, item.inspiration, item.top, item.heart, item.base, item.layering].join(" ").toLowerCase();
        if (!hay.includes(searchTerm)) return false;
    }
    return true;
}

function ratingClass(r) {
    if (r === null || r === undefined || r === "") return "rating-none";
    const n = Number(r);
    if (n >= 8.5) return "rating-outstanding";
    if (n >= 6.5) return "rating-great";
    if (n >= 4.5) return "rating-decent";
    return "rating-weak";
}
function ratingHtml(r) {
    if (r === null || r === undefined || r === "") return `<span class="rating-pill rating-none">—</span>`;
    return `<span class="rating-pill ${ratingClass(r)}">${Number(r).toFixed(1)}<span style="opacity:0.6;font-weight:400">/10</span></span>`;
}

function getVisible() {
    let list = data.filter(matches);
    if (sortKey) {
        list = list.slice().sort((a,b) => {
            let av, bv;
            if (sortKey === "perf")   { av = PERF_ORDER[a.perf]; bv = PERF_ORDER[b.perf]; }
            else if (sortKey === "rating") {
                av = (a.rating !== null && a.rating !== undefined && a.rating !== "") ? Number(a.rating) : -1;
                bv = (b.rating !== null && b.rating !== undefined && b.rating !== "") ? Number(b.rating) : -1;
            }
            else { av = (a[sortKey]||"").toLowerCase(); bv = (b[sortKey]||"").toLowerCase(); }
            if (av < bv) return -1*sortDir;
            if (av > bv) return 1*sortDir;
            return 0;
        });
    }
    return list;
}

function linkifyLayering(text) {
    if (!text) return "";
    return text.replace(/\{([^}]+)\}/g, '<span class="layering-target">$1</span>');
}
function fragranticaUrl(item) {
    return "https://www.fragrantica.com/search/?q=" + encodeURIComponent((item.house + " " + item.name).replace(/\(.*?\)/g,"").trim());
}

function render() {
    const editing = document.body.classList.contains("edit-enabled");
    const colspan = editing ? 9 : 8;
    const list = getVisible();
    const body = document.getElementById("tableBody");

    if (list.length === 0) {
        body.innerHTML = `<tr class="empty-row"><td colspan="${colspan}">No fragrances match the current filters.</td></tr>`;
    } else {
        body.innerHTML = list.map(item => {
            const p = PERF[item.perf] || PERF[""];
            const wishCls = item.status === "wishlist" ? " wish" : "";
            const priceTxt = (item.price !== null && item.price !== undefined && item.price !== "")
                ? (item.price === 0 ? "Free Gift" : "$" + Number(item.price).toFixed(2)) : "";
            const flagIcon = item.flag ? `<span class="flag-warn" title="${item.flag.replace(/"/g,'&quot;')}">⚠️</span>` : "";
            const layerIcon = item.layering ? `<span class="layer-dot" title="Has layering recommendation">◆</span>` : "";
            return `
            <tr class="data-row" onclick="toggleRow(event,'${item.id}')">
                <td style="color:var(--accent-blue);font-size:0.7rem">▸</td>
                <td><span class="perfume-name${wishCls}">${item.name}</span>${flagIcon}${layerIcon}<br><span class="house-tag">${item.house}</span></td>
                <td style="font-style:italic;color:var(--text-muted)">${item.inspiration||"—"}</td>
                <td class="notes-list"><span class="notes-label">Top:</span>${item.top||"—"}<br><span class="notes-label">Mid:</span>${item.heart||"—"}<br><span class="notes-label">Base:</span>${item.base||"—"}</td>
                <td><span class="badge ${p.cls}">${p.txt}</span></td>
                <td>${ratingHtml(item.rating)}</td>
                <td><span class="scenario-badge">${(SCENARIO[item.scenario]||"—")}</span></td>
                <td><span class="status-badge st-${item.status}">${STATUS[item.status]}</span><span class="price-tag">${priceTxt}</span></td>
                <td class="col-edit" onclick="event.stopPropagation()">
                    <button class="row-btn btn-edit" onclick="openModal('${item.id}')" title="Edit">✎</button>
                    <button class="row-btn btn-del" onclick="deleteEntry('${item.id}')" title="Delete">×</button>
                </td>
            </tr>
            <tr class="detail-row" id="detail-${item.id}">
                <td colspan="${colspan}">
                    <div class="detail-container">
                        <div>
                            ${item.review ? `<div class="review-box"><strong>Assessment:</strong> ${item.review}</div>` : `<div class="review-box" style="border-color:var(--accent-amber);color:var(--text-muted)">No review yet — to be fleshed out.</div>`}
                            ${item.layering ? `<div class="layering-box">🧪 <strong>Layering:</strong> ${linkifyLayering(item.layering)}</div>` : ""}
                            <a class="fragrantica-link" href="${fragranticaUrl(item)}" target="_blank" onclick="event.stopPropagation()">🌐 Search on Fragrantica →</a>
                        </div>
                        <div class="detail-stats-box">
                            <div class="stat-item"><span class="stat-key">My Rating</span>${ratingHtml(item.rating)}</div>
                            <div class="stat-item"><span class="stat-key">Family</span>${FAMILY[item.family]||"—"}</div>
                            <div class="stat-item"><span class="stat-key">Inspiration House</span>${HOUSECAT[item.houseCat]||"—"}</div>
                            <div class="stat-item"><span class="stat-key">Longevity</span>${item.longevity||"—"}</div>
                            <div class="stat-item"><span class="stat-key">Projection</span>${item.projection||"—"}</div>
                            ${item.flag ? `<div class="stat-item" style="color:var(--accent-amber)"><span class="stat-key" style="color:var(--accent-amber)">⚠️ Flag</span>${item.flag}</div>` : ""}
                            <div class="detail-actions edit-only"><button class="btn" onclick="openModal('${item.id}')">✎ Edit</button></div>
                        </div>
                    </div>
                </td>
            </tr>`;
        }).join("");
    }
    renderSummary(list);
    updateSortArrows();
}

function renderSummary(list) {
    const total = data.length;
    const owned = data.filter(d=>d.status==="owned").length;
    const ordered = data.filter(d=>d.status==="ordered").length;
    const wish = data.filter(d=>d.status==="wishlist").length;
    const spent = data.reduce((s,d)=> s + (Number(d.price)||0), 0);
    const flagged = data.filter(d=>d.flag).length;
    const rated = data.filter(d => d.rating !== null && d.rating !== undefined && d.rating !== "");
    const avgRating = rated.length ? (rated.reduce((s,d) => s + Number(d.rating), 0) / rated.length).toFixed(1) : "—";
    const cards = [
        {n: list.length, l:"Showing (filtered)", c:""},
        {n: total, l:"Total Collection", c:""},
        {n: owned, l:"✅ Owned", c:"green"},
        {n: ordered, l:"📦 Ordered", c:""},
        {n: wish, l:"🎯 Wishlist", c:"purple"},
        {n: "$"+spent.toFixed(0), l:"💸 Spent (ordered)", c:"amber"},
        {n: avgRating + (rated.length ? "/10" : ""), l:"⭐ Avg Rating", c:"green"},
        {n: flagged, l:"⚠️ Needs Audit", c:"amber"},
    ];
    document.getElementById("summaryDashboard").innerHTML = cards.map(c =>
        `<div class="stat-card ${c.c}"><div class="stat-num">${c.n}</div><div class="stat-label">${c.l}</div></div>`).join("");
}

function toggleRow(e, id) {
    if (e.target.closest(".fragrantica-link") || e.target.closest(".row-btn") || e.target.closest("button")) return;
    const d = document.getElementById("detail-" + id);
    d.style.display = d.style.display === "table-row" ? "none" : "table-row";
}

/* ============================ SORTING ============================ */
document.querySelectorAll("#masterTable th[data-sort]").forEach(th => {
    th.addEventListener("click", () => {
        const k = th.getAttribute("data-sort");
        if (sortKey === k) sortDir *= -1; else { sortKey = k; sortDir = 1; }
        render();
    });
});
function updateSortArrows() {
    document.querySelectorAll("#masterTable th[data-sort]").forEach(th => {
        const a = th.querySelector(".arrow");
        if (!a) return;
        a.textContent = (th.getAttribute("data-sort") === sortKey) ? (sortDir === 1 ? "▲" : "▼") : "";
    });
}

/* ============================ SEARCH ============================ */
document.getElementById("searchInput").addEventListener("input", e => { searchTerm = e.target.value.toLowerCase().trim(); render(); });

/* ============================ EDIT MODE ============================ */
function toggleEdit() {
    document.body.classList.toggle("edit-enabled");
    document.getElementById("editToggleBtn").classList.toggle("active");
    render();
}
function toggleFlagFilter() {
    flagOnly = !flagOnly;
    document.getElementById("flagFilterBtn").classList.toggle("active", flagOnly);
    render();
}

/* ============================ MODAL (ADD / EDIT) ============================ */
function fillSelect(id, dict, allowBlank) {
    const s = document.getElementById(id);
    let html = allowBlank ? `<option value="">— (unknown)</option>` : "";
    for (const k in dict) html += `<option value="${k}">${dict[k]}</option>`;
    s.innerHTML = html;
}
function initSelects() {
    fillSelect("f-family", FAMILY, false);
    fillSelect("f-scenario", SCENARIO, false);
    fillSelect("f-houseCat", HOUSECAT, false);
    fillSelect("f-status", STATUS, false);
    fillSelect("f-perf", {beast:"Beast Mode", long:"Long Lasting", mod:"Moderate", weak:"Weak / Reapply"}, true);
}
function openModal(id) {
    const editing = !!id;
    document.getElementById("modalTitle").textContent = editing ? "Edit Fragrance" : "Add Fragrance";
    const item = editing ? data.find(d=>d.id===id) : {family:"fresh",scenario:"casual",houseCat:"original-other",status:"owned",perf:""};
    const g = f => document.getElementById("f-"+f);
    g("id").value = editing ? id : "";
    ["name","house","inspiration","top","heart","base","longevity","projection","layering","review","flag"].forEach(f => g(f).value = item[f]||"");
    g("price").value = (item.price!==null && item.price!==undefined) ? item.price : "";
    g("rating").value = (item.rating!==null && item.rating!==undefined && item.rating!=="") ? item.rating : "";
    ["family","scenario","houseCat","status","perf"].forEach(f => g(f).value = item[f]||"");
    document.getElementById("modalOverlay").classList.add("visible");
}
function closeModal() { document.getElementById("modalOverlay").classList.remove("visible"); }
function saveEntry() {
    const g = f => document.getElementById("f-"+f).value;
    const name = g("name").trim();
    if (!name) { alert("Name is required."); return; }
    const id = g("id");
    const priceRaw = g("price").trim();
    const rec = {
        name, house:g("house").trim(), inspiration:g("inspiration").trim(),
        family:g("family"), scenario:g("scenario"), houseCat:g("houseCat"), status:g("status"), perf:g("perf"),
        price: priceRaw === "" ? null : Number(priceRaw),
        rating: g("rating").trim() === "" ? null : Math.min(10, Math.max(0, Number(g("rating").trim()))),
        top:g("top").trim(), heart:g("heart").trim(), base:g("base").trim(),
        longevity:g("longevity").trim(), projection:g("projection").trim(),
        layering:g("layering").trim(), review:g("review").trim(), flag:g("flag").trim()
    };
    if (id) { const i = data.findIndex(d=>d.id===id); rec.id = id; data[i] = rec; }
    else { rec.id = "f" + Date.now(); data.push(rec); }
    save(); closeModal(); render();
}
function deleteEntry(id) {
    const item = data.find(d=>d.id===id);
    if (confirm(`Delete "${item.name}" (${item.house})? This cannot be undone.`)) {
        data = data.filter(d=>d.id!==id); save(); render();
    }
}

/* ============================ EXPORT / IMPORT / RESET ============================ */
function exportJSON() {
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "scentvault-collection.json";
    a.click();
    URL.revokeObjectURL(a.href);
}
function importJSON(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
        try {
            const parsed = JSON.parse(reader.result);
            if (!Array.isArray(parsed)) throw new Error("Not an array");
            if (!confirm(`Import ${parsed.length} fragrances? This replaces your current list.`)) return;
            data = parsed;
            data.forEach((d,i) => { if (!d.id) d.id = "imp"+i; });
            save(); render();
        } catch(err) { alert("Invalid JSON file: " + err.message); }
    };
    reader.readAsText(file);
    e.target.value = "";
}
function resetData() {
    if (confirm("Restore the original bundled dataset? Your edits will be lost (export first if unsure).")) {
        data = seedCopy(); save(); render();
    }
}

/* ============================ PICK FOR ME ============================ */
function pickForMe() {
    const pool = getVisible();
    if (pool.length === 0) { alert("No fragrances match the current filters — loosen them first."); return; }
    const pick = pool[Math.floor(Math.random()*pool.length)];
    document.getElementById("pickName").textContent = `${pick.name} — ${pick.house}`;
    const bits = [SCENARIO[pick.scenario], FAMILY[pick.family], (PERF[pick.perf]||PERF[""]).txt].filter(Boolean);
    document.getElementById("pickSub").textContent = bits.join("  ·  ") + (pick.inspiration ? `  ·  DNA: ${pick.inspiration}` : "");
    document.getElementById("pickBanner").classList.add("visible");
}

/* ============================ INIT ============================ */
function init() {
    load();
    buildFilterBar("family-filters", FAMILY, "family");
    buildFilterBar("scenario-filters", SCENARIO, "scenario");
    buildFilterBar("house-filters", HOUSECAT, "houseCat");
    buildFilterBar("status-filters", STATUS, "status");
    initSelects();
    render();
    document.getElementById("modalOverlay").addEventListener("click", e => { if (e.target.id === "modalOverlay") closeModal(); });
}
init();
</script>
</body>
</html>
